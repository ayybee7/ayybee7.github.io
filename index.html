<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>αebe - Coming soon</title>
    <style>
        /* Hier beginnt das Design (CSS) */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        /* --- Passwort Overlay Styling --- */
        #password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Liegt über allem */
            transition: opacity 0.5s ease;
        }

        #password-overlay input {
            padding: 10px;
            font-size: 1.2rem;
            border: 1px solid #1a1a1a;
            border-radius: 5px;
            text-align: center;
            outline: none;
        }

        #password-overlay p {
            font-size: 1rem;
            margin-bottom: 20px;
        }

        /* --- Dein restliches Design --- */
        h1 {
            font-size: 8rem;
            margin: 0;
            color: #1a1a1a;
            letter-spacing: 5px;
            font-weight: 400;
        }

        sup { font-size: 0.5em; vertical-align: super; }
        sub { font-size: 0.5em; vertical-align: sub; }

        #alpha-zeichen, #beta-zeichen {
            display: inline-block;
            cursor: pointer;
            transition: transform 0.6s ease-out; 
        }

        #epsilon-hoch, #epsilon-tief {
            display: inline-block;
            cursor: pointer;
            transition: opacity 0.5s ease; 
        }

        .main-text {
            font-size: 1.5rem;
            color: #888888;
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="password-overlay">
        <p>Bitte Passwort eingeben</p>
        <input type="password" id="password-input" placeholder="Passwort..." autofocus>
    </div>

    <h1>
        <span id="alpha-zeichen">α</span><sup id="epsilon-hoch">ε</sup><span id="beta-zeichen">β</span><sub id="epsilon-tief">ε</sub>
    </h1>
    <p class="main-text">Coming soon</p>

    <script>
        // --- 1. Passwort Logik ---
        const passwortOverlay = document.getElementById('password-overlay');
        const passwortInput = document.getElementById('password-input');
        
        // HIER dein Passwort festlegen:
        const RICHTIGES_PASSWORT = "DeinGeheimnis123"; 

        passwortInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (passwortInput.value === RICHTIGES_PASSWORT) {
                    // Overlay ausblenden
                    passwortOverlay.style.opacity = '0';
                    setTimeout(() => {
                        passwortOverlay.style.display = 'none';
                    }, 500);
                } else {
                    alert("Falsches Passwort!");
                    passwortInput.value = "";
                }
            }
        });

        // --- 2. Deine bestehenden Funktionen ---
        function bewegeZufaellig(element) {
            const zufallX = (Math.random() * 80) - 40; 
            const zufallY = (Math.random() * 80) - 40; 
            element.style.transform = `translate(${zufallX}vw, ${zufallY}vh)`;
        }

        const alpha = document.getElementById('alpha-zeichen');
        alpha.addEventListener('click', function() { bewegeZufaellig(alpha); });

        const beta = document.getElementById('beta-zeichen');
        beta.addEventListener('click', function() { bewegeZufaellig(beta); });

        const epsilonHoch = document.getElementById('epsilon-hoch');
        const epsilonTief = document.getElementById('epsilon-tief');

        function unsichtbarMachen(element) {
            element.style.opacity = '0'; 
            element.style.pointerEvents = 'none'; 
        }

        epsilonHoch.addEventListener('click', function() { unsichtbarMachen(epsilonHoch); });
        epsilonTief.addEventListener('click', function() { unsichtbarMachen(epsilonTief); });
    </script>

</body>
</html>
