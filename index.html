<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>αebe - Welcome</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            color: #1a1a1a;
            letter-spacing: 5px;
            font-weight: 400;
        }

        sup { font-size: 0.5em; vertical-align: super; }
        sub { font-size: 0.5em; vertical-align: sub; }

        #alpha-zeichen, #beta-zeichen {
            display: inline-block;
            cursor: pointer;
            transition: transform 0.6s ease-out; 
        }

        #epsilon-hoch, #epsilon-tief {
            display: inline-block;
            cursor: pointer;
            transition: opacity 0.5s ease; 
        }

        p {
            font-size: 1.5rem;
            color: #888888;
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- Passwort Feld Styling --- */
        .pw-container {
            margin-top: 30px;
        }

        #pw-input {
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 10px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            color: #1a1a1a;
            transition: border-color 0.3s;
        }

        #pw-input:focus {
            border-bottom: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>
    
    <h1>
        <span id="alpha-zeichen">α</span><sup id="epsilon-hoch">ε</sup><span id="beta-zeichen">β</span><sub id="epsilon-tief">ε</sub>
    </h1>
    <p>Coming soon</p>

    <div class="pw-container">
        <input type="password" id="pw-input" placeholder="can you guess it?">
    </div>

    <script>
        // --- Passwort Logik ---
        const pwInput = document.getElementById('pw-input');
        const GEHEIMNIS = "aebe11"; // Hier dein Passwort ändern!

        pwInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (pwInput.value === GEHEIMNIS) {
                    // Weiterleitung zur neuen Seite
                    window.location.href = "stay-tuned.html";
                } else {
                    alert(":(");
                    pwInput.value = "";
                }
            }
        });

        // --- Deine Animationen ---
        function bewegeZufaellig(element) {
            const zufallX = (Math.random() * 80) - 40; 
            const zufallY = (Math.random() * 80) - 40; 
            element.style.transform = `translate(${zufallX}vw, ${zufallY}vh)`;
        }

        const alpha = document.getElementById('alpha-zeichen');
        alpha.addEventListener('click', function() { bewegeZufaellig(alpha); });

        const beta = document.getElementById('beta-zeichen');
        beta.addEventListener('click', function() { bewegeZufaellig(beta); });

        const epsilonHoch = document.getElementById('epsilon-hoch');
        const epsilonTief = document.getElementById('epsilon-tief');

        function unsichtbarMachen(element) {
            element.style.opacity = '0'; 
            element.style.pointerEvents = 'none'; 
        }

        epsilonHoch.addEventListener('click', function() { unsichtbarMachen(epsilonHoch); });
        epsilonTief.addEventListener('click', function() { unsichtbarMachen(epsilonTief); });
    </script>

</body>
</html>
