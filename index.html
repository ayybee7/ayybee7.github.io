<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>αebe - Coming soon</title>
    <style>
        /* Hier beginnt das Design (CSS) */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; /* Wichtig: Verhindert Scrollbalken, wenn Zeichen an den Rand springen */
        }

        h1 {
            font-size: 8rem;
            margin: 0;
            color: #1a1a1a;
            letter-spacing: 5px;
            font-weight: 400;
        }

        sup {
            font-size: 0.5em;
            vertical-align: super;
        }

        sub {
            font-size: 0.5em;
            vertical-align: sub;
        }

        /* --- Klickbare Eigenschaften für Alpha und Beta --- */
        #alpha-zeichen, #beta-zeichen {
            display: inline-block;
            cursor: pointer;
            /* Die Animation ist jetzt etwas schneller (0.6s) und gleichmäßiger (ease-out), was besser zum Springen passt */
            transition: transform 0.6s ease-out; 
        }

        /* --- Eigenschaften für die Epsilons --- */
        #epsilon-hoch, #epsilon-tief {
            display: inline-block;
            cursor: pointer;
            transition: opacity 0.5s ease; 
        }

        p {
            font-size: 1.5rem;
            color: #888888;
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    
    <h1>
        <span id="alpha-zeichen">α</span><sup id="epsilon-hoch">ε</sup><span id="beta-zeichen">β</span><sub id="epsilon-tief">ε</sub>
    </h1>
    <p>Coming soon</p>

    <script>
        // --- 1. Die Zufalls-Maschine ---
        // Diese Funktion schnappt sich ein Zeichen und wirft es an einen zufälligen Ort
        function bewegeZufaellig(element) {
            // Math.random() erzeugt eine Zahl. Wir rechnen das so um, dass ein 
            // Wert zwischen -40 und +40 herauskommt. 
            // -40 bedeutet weit nach links/oben, +40 bedeutet weit nach rechts/unten.
            const zufallX = (Math.random() * 80) - 40; 
            const zufallY = (Math.random() * 80) - 40; 
            
            // vw = Viewport Width (Bildschirmbreite), vh = Viewport Height (Bildschirmhöhe)
            element.style.transform = `translate(${zufallX}vw, ${zufallY}vh)`;
        }

        // --- 2. Alpha klickbar machen ---
        const alpha = document.getElementById('alpha-zeichen');
        alpha.addEventListener('click', function() {
            // Ruft unsere Zufalls-Maschine für das Alpha auf
            bewegeZufaellig(alpha);
        });

        // --- 3. Beta klickbar machen ---
        const beta = document.getElementById('beta-zeichen');
        beta.addEventListener('click', function() {
            // Ruft unsere Zufalls-Maschine für das Beta auf
            bewegeZufaellig(beta);
        });

        // --- 4. Epsilons verschwinden lassen (wie bisher) ---
        const epsilonHoch = document.getElementById('epsilon-hoch');
        const epsilonTief = document.getElementById('epsilon-tief');

        function unsichtbarMachen(element) {
            element.style.opacity = '0'; 
            element.style.pointerEvents = 'none'; 
        }

        epsilonHoch.addEventListener('click', function() { unsichtbarMachen(epsilonHoch); });
        epsilonTief.addEventListener('click', function() { unsichtbarMachen(epsilonTief); });
    </script>

</body>
</html>
